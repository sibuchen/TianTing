# ============================================================================
# TianTing Docker Compose — 生产模式

# 启动: docker compose -f docker-compose.yml up -d
# 通过 -f 显式指定只使用基础文件，从而忽略 docker-compose.override.yml

# 这种模式下，只使用基础的 docker-compose.yml 配置。
# 自动使用 Dockerfile 编译的镜像内容（不挂载本地代码），并且不会包含 override 文件中的开发调试配置。

# 开发模式请使用: docker compose up -d （自动加载 docker-compose.override.yml）
# ============================================================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tianting-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tianting
      POSTGRES_USER: sibuchen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres-sibuchen-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sibuchen -d tianting"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tianting-sibuchen

  redis:
    image: redis:7-alpine
    container_name: tianting-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-sibuchen-password}
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis-sibuchen-password}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD:-redis-sibuchen-password} ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tianting-sibuchen

  qdrant:
    image: qdrant/qdrant:latest
    container_name: tianting-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-qdrant-sibuchen-password}
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tianting-sibuchen

  neo4j:
    image: neo4j:5-community
    container_name: tianting-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4j-sibuchen-password}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./database/neo4j:/init-scripts:ro
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-neo4j-sibuchen-password}", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - tianting-sibuchen

  mongodb:
    image: mongo:7
    container_name: tianting-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: sibuchen
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongo-sibuchen-password}
      MONGO_INITDB_DATABASE: tianting
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./database/mongodb/01_init.js:/docker-entrypoint-initdb.d/01_init.js:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh -u sibuchen -p $${MONGO_PASSWORD:-mongo-sibuchen-password} --authenticationDatabase admin --eval \"db.adminCommand('ping')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tianting-sibuchen

  backend:
    image: sibuchen-tianting-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tianting-backend
    restart: unless-stopped
    environment:
      - APP_PORT=2811
      - DATABASE_URL=postgresql+asyncpg://sibuchen:${POSTGRES_PASSWORD:-postgres-sibuchen-password}@postgres:5432/tianting
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis-sibuchen-password}@redis:6379/0
      - ARQ_REDIS_URL=redis://:${REDIS_PASSWORD:-redis-sibuchen-password}@redis:6379/1
      - ENVIRONMENT=production
      - CORS_ORIGINS=["http://localhost:${GATEWAY_PORT:-3534}","http://127.0.0.1:${GATEWAY_PORT:-3534}"]
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-this-32-byte-key-in-prod!}
      - TOKEN_STORE_DIR=/home/tianting/.tianting
      - FEISHU_ENABLED=${FEISHU_ENABLED:-false}
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - FEISHU_VERIFICATION_TOKEN=${FEISHU_VERIFICATION_TOKEN:-}
      - FEISHU_ENCRYPT_KEY=${FEISHU_ENCRYPT_KEY:-}
      - FEISHU_EVENT_MODE=${FEISHU_EVENT_MODE:-websocket}
      - EMBED_MODEL_BASE_URL=${EMBED_MODEL_BASE_URL:-}
      - EMBED_MODEL_API_KEY=${EMBED_MODEL_API_KEY:-}
      - EMBED_MODEL_ID=${EMBED_MODEL_ID:-}
      - EMBED_MODEL_DIMENSION=${EMBED_MODEL_DIMENSION:-4096}
      - QDRANT_ENABLED=${QDRANT_ENABLED:-true}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-qdrant-sibuchen-password}
      - NEO4J_ENABLED=${NEO4J_ENABLED:-true}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j-sibuchen-password}
      - MONGODB_ENABLED=${MONGODB_ENABLED:-true}
      - MONGODB_URL=mongodb://sibuchen:${MONGO_PASSWORD:-mongo-sibuchen-password}@mongodb:27017/tianting?authSource=admin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
      mongodb:
        condition: service_started
    volumes:
      - tianting_data:/home/tianting/.tianting
      - tianting_uploads:/tmp/tianting/uploads
    networks:
      - tianting-sibuchen

  frontend:
    image: sibuchen-tianting-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tianting-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - tianting-sibuchen

  gateway:
    image: nginx:alpine
    container_name: tianting-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-3534}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - tianting-sibuchen

volumes:
  postgres_data:
    name: sibuchen-tianting-postgres-data
  redis_data:
    name: sibuchen-tianting-redis-data
  tianting_data:
    name: sibuchen-tianting-data
  tianting_uploads:
    name: sibuchen-tianting-uploads
  qdrant_data:
    name: sibuchen-tianting-qdrant-data
  neo4j_data:
    name: sibuchen-tianting-neo4j-data
  neo4j_logs:
    name: sibuchen-tianting-neo4j-logs
  mongodb_data:
    name: sibuchen-tianting-mongodb-data
  mongodb_config:
    name: sibuchen-tianting-mongodb-config

networks:
  tianting-sibuchen:
    name: tianting-sibuchen_tianting-sibuchen
    driver: bridge