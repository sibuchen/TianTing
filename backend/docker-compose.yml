version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tianting-postgres
    environment:
      POSTGRES_DB: tianting
      POSTGRES_USER: sibuchen
      POSTGRES_PASSWORD: postgres-sibuchen-password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sibuchen"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tianting-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tianting-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://sibuchen:postgres-sibuchen-password@postgres:5432/tianting
      REDIS_URL: redis://redis:6379/0
      ARQ_REDIS_URL: redis://redis:6379/1
      JWT_SECRET_KEY: your-secret-key-change-in-production
      ENCRYPTION_KEY: your-32-byte-encryption-key!
      TOKEN_STORE_DIR: /home/tianting/.tianting
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/tmp/tianting/uploads
      - ./logs:/var/log/tianting
      - tianting_data:/home/tianting/.tianting
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tianting-worker
    command: ["arq", "app.tasks.worker:WorkerSettings"]
    environment:
      DATABASE_URL: postgresql+asyncpg://sibuchen:postgres-sibuchen-password@postgres:5432/tianting
      REDIS_URL: redis://redis:6379/0
      ARQ_REDIS_URL: redis://redis:6379/1
      JWT_SECRET_KEY: your-secret-key-change-in-production
      ENCRYPTION_KEY: your-32-byte-encryption-key!
      TOKEN_STORE_DIR: /home/tianting/.tianting
    volumes:
      - ./uploads:/tmp/tianting/uploads
      - tianting_data:/home/tianting/.tianting
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  tianting_data:
